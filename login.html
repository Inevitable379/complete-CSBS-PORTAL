<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSBS Portal | Login</title>
    <meta name="description" content="Sign in to the CSBS Student Portal" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
            position: relative;
        }

        /* Animated gradient orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: var(--accent);
            top: -150px; right: -100px;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: var(--violet);
            bottom: -100px; left: -80px;
            animation: orbFloat 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.1); }
        }

        /* Login Card */
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow-lg);
            animation: cardEntry 0.6s var(--ease-out) forwards;
            opacity: 0;
            transform: translateY(16px);
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 56px; height: 56px;
            background: var(--accent-muted);
            border: 1px solid var(--border-active);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: var(--sp-6);
            box-shadow: var(--accent-glow);
        }

        .login-card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-1);
            margin-bottom: var(--sp-2);
        }

        .login-card .subtitle {
            color: var(--text-2);
            font-size: 0.88rem;
            text-align: center;
            line-height: 1.5;
            margin-bottom: var(--sp-8);
        }

        .g-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .g_id_signin {
            display: flex;
            justify-content: center;
        }

        /* Dev bypass */
        #dev-bypass {
            display: none;
            margin-top: var(--sp-6);
            width: 100%;
        }

        #dev-bypass .divider {
            border-top: 1px solid var(--border);
            padding-top: var(--sp-5);
            text-align: center;
        }

        #dev-bypass .dev-label {
            font-size: 0.75rem;
            color: var(--text-3);
            margin-bottom: var(--sp-3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .dev-btn {
            padding: var(--sp-3) var(--sp-5);
            background: var(--bg-2);
            color: var(--text-2);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.82rem;
            transition: all var(--dur-instant) var(--ease-out);
        }
        .dev-btn:hover {
            color: var(--text-1);
            border-color: var(--border-hover);
            background: var(--bg-3);
        }

        /* Error message */
        #login-error {
            margin-top: var(--sp-6);
            padding: var(--sp-3) var(--sp-4);
            border-radius: var(--r-sm);
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-left: 3px solid var(--danger);
            color: var(--danger);
            font-size: 0.82rem;
            font-weight: 500;
            display: none;
            width: 100%;
            align-items: center;
            gap: var(--sp-3);
        }

        .login-footer {
            margin-top: var(--sp-8);
            font-size: 0.75rem;
            color: var(--text-3);
            text-align: center;
        }

        @media (max-width: 480px) {
            .login-card { margin: var(--sp-4); padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-graduation-cap"></i></div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in with your Jain University email to access the CSBS Portal.</p>

        <button class="google-signin-btn" onclick="signInWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.62z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.85.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
                <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
                <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.43 1.35l2.58-2.59C13.46.9 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
            </svg>
            Sign in with Google
        </button>
        <p class="signin-hint">Use your <strong>@jainuniversity.ac.in</strong> account — you'll be asked which account to use each time.</p>

        <style>
            .google-signin-btn {
                width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
                padding: 12px 16px; background: var(--bg-0); border: 1px solid var(--border-hover);
                border-radius: var(--r-sm); font-family: inherit; font-size: 0.9rem; font-weight: 600;
                color: var(--text-1); cursor: pointer; transition: all var(--dur-instant) var(--ease-out);
            }
            .google-signin-btn:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
            .google-signin-btn:active { transform: scale(0.99); }
            .signin-hint { margin-top: var(--sp-4); font-size: 0.78rem; color: var(--text-3); text-align: center; line-height: 1.5; }
        </style>

        <!-- Dev bypass: only visible on localhost -->
        <div id="dev-bypass">
            <div class="divider">
                <p class="dev-label">Development Mode</p>
                <button class="dev-btn" onclick="devLogin()">
                    <i class="fas fa-code" style="margin-right:6px"></i> Skip Login (localhost only)
                </button>
            </div>
        </div>

        <div id="login-error">
            <i class="fas fa-exclamation-circle"></i>
            <span>Access Denied: You are not authorized.</span>
        </div>

        <div class="login-footer">CSBS Portal &middot; Jain University</div>
    </div>

    <script>
        const CLIENT_ID = "212930513958-1mh49c4j0l3sqjbsbq5b6q1o4oav139e.apps.googleusercontent.com";

        // Redirect to Google with prompt=select_account so the user ALWAYS
        // chooses which account to use (fixes silent sign-in with the wrong email).
        function signInWithGoogle() {
            const nonce = crypto.getRandomValues(new Uint32Array(4)).join('');
            sessionStorage.setItem('oauth_nonce', nonce);
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: window.location.origin + '/login.html',
                response_type: 'id_token',
                scope: 'openid email profile',
                nonce: nonce,
                prompt: 'select_account'
            });
            window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
        }

        function showError(msg) {
            const e = document.getElementById('login-error');
            e.style.display = 'flex';
            e.querySelector('span').textContent = msg;
        }

        // Send Google's id_token to the server for verification + whitelist check.
        async function sendToken(idToken) {
            document.getElementById('login-error').style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ token: idToken })
                });
                const data = await res.json();
                if (res.ok && data.success) { window.location.href = '/'; }
                else { showError(data.error || 'Authentication failed. Please try again.'); }
            } catch (err) {
                showError('Network error. Please check your connection.');
            }
        }

        // Handle Google's redirect back — the id_token arrives in the URL fragment.
        (function handleRedirect() {
            if (!location.hash) return;
            const p = new URLSearchParams(location.hash.slice(1));
            const idToken = p.get('id_token');
            const err = p.get('error');
            history.replaceState(null, '', location.pathname);
            if (idToken) sendToken(idToken);
            else if (err) showError('Google sign-in was cancelled. Please try again.');
        })();

        // Dev bypass — localhost only
        async function devLogin() {
            if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ dev_bypass: true })
                });
                const data = await res.json();
                if (res.ok && data.success) window.location.href = '/';
                else showError(data.error || 'Dev login failed.');
            } catch (err) { console.error('Dev login error:', err); }
        }
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            document.getElementById('dev-bypass').style.display = 'block';
        }

        // If already authenticated, go to the dashboard
        fetch('/api/auth/check', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => { if (data.authenticated) window.location.href = '/'; })
            .catch(() => {});
    </script>
</body>
</html>
